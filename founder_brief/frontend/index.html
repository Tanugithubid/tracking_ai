<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Founder | The Executive Brief</title>
    <meta name="theme-color" content="#03040b">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@1,400;1,700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-deep: #03040b;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #a5b4fc;
            /* Pale Lavender/Indigo */
            --amber-glow: #f59e0b;
            /* Energetic Amber */
            --text-high: #ffffff;
            --text-mid: #94a3b8;
            --font-main: 'Outfit', sans-serif;
            --font-quote: 'Playfair Display', serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            background: var(--bg-deep);
            color: var(--text-high);
            -webkit-font-smoothing: antialiased;
        }

        .ambient-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% -20%, rgba(165, 180, 252, 0.08) 0%, transparent 60%);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent);
            opacity: 0.7;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem;
        }

        .nav-link {
            background: none;
            border: none;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-mid);
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-link.active {
            color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
            padding: 0.4rem 1rem;
            border-radius: 20px;
        }

        /* HERO SPARK CARD: The Founder's Vision UI */
        .hero-spark-container {
            margin-top: 10vh;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        .hero-spark-text {
            font-family: var(--font-quote);
            font-style: italic;
            font-size: 2rem;
            line-height: 1.5;
            margin-bottom: 2rem;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .deep-dive-btn {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.3s;
        }

        /* MORNING DIGEST ENERGETIC UI */
        .morning-section {
            margin-top: 1rem;
            animation: floatUp 0.8s ease-out;
        }

        .morning-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }

        .archive-item {
            cursor: pointer;
            opacity: 0.7;
            margin-bottom: 0.8rem;
        }

        .archive-item:hover {
            opacity: 1;
            border-color: var(--accent);
        }

        .archive-content {
            display: none;
            margin-top: 1rem;
            border-top: 1px solid var(--glass-border);
            padding-top: 1rem;
        }

        .archive-item.expanded {
            opacity: 1;
            border-color: var(--accent);
        }

        .archive-item.expanded .archive-content {
            display: block;
        }

        .morning-h {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--amber-glow);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .morning-p {
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--text-high);
            margin-bottom: 1rem;
        }

        .tag-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            border-left: 3px solid var(--accent);
        }

        .tag-title {
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.3rem;
        }

        .tag-desc {
            font-size: 0.95rem;
            color: var(--text-mid);
        }

        .mastery-box {
            background: rgba(129, 140, 248, 0.05);
            border-radius: 20px;
            padding: 1.5rem;
        }

        .mastery-before {
            font-size: 0.8rem;
            color: #ef4444;
            opacity: 0.6;
            margin-bottom: 0.5rem;
            text-decoration: line-through;
        }

        .mastery-after {
            font-size: 1rem;
            color: #10b981;
            font-weight: 600;
            line-height: 1.4;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes floatUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mic Button */
        .input-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
            width: 100%;
        }

        #thoughtInput,
        #masteryInput,
        #journalInput {
            width: 100%;
            height: 180px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            color: var(--text-high);
            font-family: var(--font-main);
            font-size: 1.1rem;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
            margin-bottom: 0.5rem;
            box-sizing: border-box;
            backdrop-filter: blur(20px);
        }

        #thoughtInput:focus,
        #masteryInput:focus,
        #journalInput:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(165, 180, 252, 0.1);
        }

        #thoughtInput::placeholder,
        #masteryInput::placeholder,
        #journalInput::placeholder {
            color: var(--text-mid);
            opacity: 0.5;
        }

        .mic-btn {
            position: relative;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            backdrop-filter: blur(20px);
            color: var(--text-mid);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .mic-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(165, 180, 252, 0.08);
        }

        .mic-btn.recording {
            background: rgba(239, 68, 68, 0.15);
            border-color: #ef4444;
            color: #ef4444;
        }

        .mic-btn.recording::before,
        .mic-btn.recording::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            border: 1.5px solid #ef4444;
            animation: micPulse 1.6s ease-out infinite;
        }

        .mic-btn.recording::after {
            animation-delay: 0.6s;
        }

        @keyframes micPulse {
            0% {
                width: 52px;
                height: 52px;
                opacity: 0.7;
            }

            100% {
                width: 90px;
                height: 90px;
                opacity: 0;
            }
        }

        .mic-status {
            font-size: 0.7rem;
            color: #ef4444;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 0.6rem;
            min-height: 1rem;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        .mic-status.hidden-status {
            visibility: hidden;
        }

        .spark-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(165, 180, 252, 0.2);
            flex: 1;
        }

        .spark-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(165, 180, 252, 0.3);
            filter: brightness(1.1);
        }

        .spark-btn:active {
            transform: translateY(0);
        }

        .spark-btn:disabled {
            background: var(--text-mid);
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .hidden {
            display: none !important;
        }

        /* Speaker Button Styles */
        .speak-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: var(--accent);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            margin-left: 0.5rem;
            vertical-align: middle;
        }

        .speak-btn:hover {
            background: rgba(165, 180, 252, 0.15);
            transform: scale(1.1);
        }

        .speak-btn.speaking {
            background: var(--accent);
            color: #000;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(165, 180, 252, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(165, 180, 252, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(165, 180, 252, 0);
            }
        }

        .speed-toggle {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--accent);
            padding: 0.4rem 0.8rem;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(10px);
            min-width: 55px;
        }

        .speed-toggle:hover {
            border-color: var(--accent);
            background: rgba(165, 180, 252, 0.08);
        }

        /* Overlay Full Brief */
        #detailPage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-deep);
            z-index: 1000;
            overflow-y: auto;
            padding: 3rem 1.5rem;
            box-sizing: border-box;
            display: none;
        }

        .section-box {
            border-bottom: 1px solid var(--glass-border);
            padding: 2rem 0;
        }

        .section-h {
            font-size: 0.6rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 3px;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .section-p {
            font-size: 1rem;
            color: var(--text-mid);
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .close-btn {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #000;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.8rem;
            z-index: 1001;
        }

        /* --- NEW FEATURES STYLES --- */
        .selection-menu {
            position: absolute;
            background: #1e1b4b;
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 0.5rem;
            display: flex;
            gap: 0.5rem;
            z-index: 2000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .selection-menu button {
            background: transparent;
            border: none;
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: 0.3s;
        }

        .selection-menu button:hover {
            background: var(--accent);
            color: black;
        }

        .floating-note {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 280px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            z-index: 1500;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }

        .note-header {
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--accent);
        }

        .note-content textarea {
            width: 100%;
            height: 120px;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-family: var(--font-main);
            resize: none;
            font-size: 0.9rem;
            padding: 1rem;
            box-sizing: border-box;
        }

        .vocab-highlight {
            color: #10b981;
            font-weight: 700;
            cursor: pointer;
            border-bottom: 2px dashed #10b981;
            padding-bottom: 2px;
            transition: 0.3s;
        }

        .vocab-highlight:hover {
            background: rgba(16, 185, 129, 0.1);
        }

        .memory-badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .badge-step0 {
            background: #3b82f6;
            color: white;
        }

        .badge-step1 {
            background: #f59e0b;
            color: white;
        }

        .badge-step2 {
            background: #10b981;
            color: white;
        }

        .badge-step3 {
            background: #94a3b8;
            color: white;
        }

        .toast-notify {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: var(--accent);
            color: black;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-weight: 700;
            z-index: 3000;
            animation: slideInRight 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        h1,
        h2,
        h3 {
            font-family: var(--font-main);
            color: var(--accent);
            font-weight: 800;
        }

        .highlighted-heading {
            font-size: 1.5rem;
            border-left: 4px solid var(--accent);
            padding-left: 1rem;
            margin: 1.5rem 0;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="ambient-bg"></div>

    <div class="container">
        <header>
            <div class="logo">Strategic Architecture Node</div>
            <div class="nav">
                <button class="nav-link active" onclick="showTab('capture')">Capture</button>
                <button class="nav-link" onclick="showTab('vault')">Vault</button>
                <button class="nav-link" onclick="showTab('morning')">Daybreak</button>
                <button class="nav-link" onclick="showTab('mastery')">MBA Lab</button>
                <button class="nav-link" onclick="showTab('memory')">Memory</button>
                <button class="nav-link" onclick="showTab('journal')">My Thought</button>
            </div>
        </header>

        <!-- Capture Section -->
        <div id="captureTab">
            <div style="margin-top: 8vh; text-align: center;" id="inputContainer">
                <textarea id="thoughtInput" placeholder="What's your spark today?"></textarea>

                <div class="input-row">
                    <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Voice input">
                        <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z" />
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                            <line x1="12" y1="19" x2="12" y2="22" />
                        </svg>
                    </button>
                    <button class="spark-btn" onclick="generateSpark()">Run Strategic Node</button>
                </div>
                <div class="mic-status hidden-status" id="micStatus">● Listening…</div>
            </div>
            <div class="hero-spark-container hidden" id="latestSparkCont">
                <div
                    style="display: flex; align-items: center; justify-content: center; gap: 0.6rem; margin-bottom: 2rem;">
                    <div class="hero-spark-text" id="sparkOutput" style="margin-bottom: 0;"></div>
                    <div style="display: flex; gap: 0.4rem;">
                        <button class="speak-btn" id="captureSpeakBtn" onclick="toggleSpeak('sparkOutput')">
                            <i data-lucide="volume-2"></i>
                        </button>
                        <button class="speed-toggle" onclick="toggleSpeed()">
                            <span class="speed-label">1.0</span>x
                        </button>
                    </div>
                </div>
                <div class="deep-dive-btn" onclick="openDetailFromlatest()">Analyze Venture Details →</div>
                <div class="spark-btn" onclick="resetCapture()"
                    style="margin-top: 3rem; opacity: 0.8; font-size: 0.7rem;">Draft New Vision +</div>
            </div>
        </div>

        <!-- Vault Section -->
        <div id="vaultTab" class="hidden">
            <div id="vaultGrid"></div>
        </div>

        <!-- Morning Section -->
        <div id="morningTab" class="hidden">
            <div id="morningGrid" class="morning-section"></div>
        </div>

        <!-- Mastery Section -->
        <div id="masteryTab" class="hidden">
            <div style="margin-top: 5vh; text-align: center;" id="masteryInputCont">
                <div class="logo" style="margin-bottom: 1.5rem; opacity: 0.5;">Stanford / Business English Mastery</div>
                <textarea id="masteryInput"
                    placeholder="Paste your paragraph or speak to refine into Stanford MBA English..."></textarea>
                <div class="input-row">
                    <button class="mic-btn" id="masteryMicBtn" onclick="toggleMic('masteryInput')" title="Voice input">
                        <i data-lucide="mic"></i>
                    </button>
                    <button class="spark-btn" onclick="refineMastery()">Refine for Boardroom</button>
                </div>
                <div class="mic-status hidden-status" id="masteryMicStatus">● Listening…</div>
            </div>
            <div id="masteryResults" class="hidden" style="margin-top: 2rem;">
                <div id="masteryContent"></div>
                <button class="spark-btn" onclick="resetMastery()"
                    style="margin-top: 2rem; width: 100%; opacity: 0.8; font-size: 0.7rem;">New Refinement +</button>
            </div>
        </div>

        <!-- Journal Section -->
        <div id="journalTab" class="hidden">
            <div style="margin-top: 5vh; text-align: center;" id="journalInputCont">
                <div class="logo" style="margin-bottom: 1.5rem; opacity: 0.5;">Personal Thought Journal</div>
                <textarea id="journalInput"
                    placeholder="Record raw thoughts, reminders, or reflections... (No AI processing)"></textarea>
                <div class="input-row">
                    <button class="mic-btn" id="journalMicBtn" onclick="toggleMic('journalInput')" title="Voice input">
                        <i data-lucide="mic"></i>
                    </button>
                    <button class="spark-btn" onclick="saveJournal()">Save to Journal</button>
                </div>
                <div class="mic-status hidden-status" id="journalMicStatus">● Listening…</div>
            </div>

            <div id="journalGrid" style="margin-top: 3rem;"></div>
        </div>

        <!-- NEW Memory Section -->
        <div id="memoryTab" class="hidden">
            <div
                style="margin-top: 5vh; padding: 1.5rem; background: var(--glass); border-radius: 20px; border: 1px solid var(--glass-border);">
                <div class="logo" style="margin-bottom: 1rem; opacity: 0.5;">Add Manual 147 Revision</div>
                <div class="input-row">
                    <input type="text" id="manualMemoryInput" placeholder="Word or Concept..."
                        style="width: 100%; padding: 0.8rem; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; outline: none;">
                    <button class="spark-btn" onclick="addManualMemory()"
                        style="flex: 0 0 auto; width: 80px; padding: 0.8rem;">Add</button>
                </div>
            </div>

            <div id="dueTasksCont" style="margin-top: 2rem;">
                <div class="morning-h" style="color: var(--amber-glow);" id="dueTasksTitle">● Due for Revision</div>
                <div id="dueTasksGrid"></div>
            </div>

            <div id="allTasksCont" style="margin-top: 3rem;">
                <div class="morning-h" id="allTasksTitle">● All Memory Tasks</div>
                <div id="allMemoryGrid"></div>
            </div>
        </div>
    </div>

    <!-- UI Overlay Elements -->
    <div id="selectionMenu" class="selection-menu hidden">
        <button onclick="copySelection()"><i data-lucide="copy"></i> Copy</button>
        <button onclick="playSelection()"><i data-lucide="volume-2"></i> Mic</button>
        <button onclick="explainSelection()"><i data-lucide="brain"></i> Explain</button>
    </div>

    <!-- Floating Note Toggle -->
    <button onclick="toggleNote()"
        style="position: fixed; bottom: 2rem; left: 2rem; width: 50px; height: 50px; border-radius: 50%; background: var(--accent); color: black; border: none; cursor: pointer; z-index: 1400; box-shadow: 0 10px 20px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center;">
        <i data-lucide="edit-3"></i>
    </button>

    <div id="floatingNote" class="floating-note hidden">
        <div class="note-header" id="noteHeader">
            <span>Sticky Note</span>
            <div style="display:flex; gap: 0.5rem;">
                <button onclick="saveFloatingNote()"
                    style="background:none; border:none; color:var(--accent); cursor:pointer;"><i
                        data-lucide="save"></i></button>
                <button onclick="toggleNote()"
                    style="background:none; border:none; color:var(--text-mid); cursor:pointer;"><i
                        data-lucide="minus"></i></button>
            </div>
        </div>
        <div class="note-content" id="noteContent">
            <textarea id="noteText" placeholder="Jot down insights..."></textarea>
        </div>
    </div>

    <!-- Detail View -->
    <div id="detailPage">

        function toggleSpeed() {
            const speeds = [0.8, 1.0, 1.2, 1.5, 2.0];
            let idx = speeds.indexOf(playbackSpeed);
            playbackSpeed = speeds[(idx + 1) % speeds.length];

            // Update all labels
            document.querySelectorAll('.speed-label').forEach(el => {
                el.innerText = playbackSpeed.toFixed(1);
            });

            // If currently speaking, we have to restart or just apply to next. 
            // Web Speech API doesn't support changing rate mid-utterance easily.
            if (window.speechSynthesis.speaking) {
                showToast(`Speed set to ${playbackSpeed}x (applies to next segment)`, 2000);
            }
        }

                document.querySelectorAll('.nav-link').forEach(l => {

                document.body.appendChild(t);
            }
            t.textContent = msg;
            t.style.opacity = '1';
            clearTimeout(t._timer);
            t._timer = setTimeout(() => { t.style.opacity = '0'; }, duration);
        }

        function highlightVocabInText(text, vocabMap) {
            if (!text || !vocabMap) return text;
            const words = Object.keys(vocabMap).sort((a, b) => b.length - a.length);
            let highlighted = text;
            words.forEach(word => {
                const info = vocabMap[word];
                const escapedWord = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp(`\\b(${escapedWord})\\b`, 'gi');
                const safeDef = info.def.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const safeEx = info.ex.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                highlighted = highlighted.replace(regex, `<span class="vocab-highlight" onclick="showVocabDetail('$1', '${safeDef}', '${safeEx}')">$1</span>`);
            });
            return highlighted;
        }

        function parseMBAMastery(raw) {
            if (!raw) return raw;
            const textMatch = raw.match(/- The Stanford GSB Rewrite:\s*(.*?)(?=\n-|$)/s);
            const mainText = textMatch ? textMatch[1].trim() : raw;
            const vocabMap = {};
            const vocabSection = (raw.match(/- Definition & Usage:\s*(.*)/s) || ["", ""])[1];
            const lines = vocabSection.split('\n');
            lines.forEach(line => {
                const lp = line.trim();
                if (!lp.startsWith('-')) return;
                const parts = lp.substring(1).split(':');
                if (parts.length < 2) return;
                const word = parts[0].trim();
                const rest = parts.slice(1).join(':').trim();
                let def = rest;
                let ex = "No example provided.";
                const exIdx = rest.toLowerCase().indexOf('example:');
                if (exIdx !== -1) {
                    def = rest.substring(0, exIdx).trim().replace(/[,\s]+$/, '');
                    ex = rest.substring(exIdx + 8).trim();
                } else {
                    const dots = rest.split('.');
                    if (dots.length > 1) {
                        def = dots[0].trim();
                        ex = dots.slice(1).join('.').trim();
                    }
                }
                vocabMap[word] = { def, ex };
            });
            if (Object.keys(vocabMap).length === 0) return raw;
            return highlightVocabInText(mainText, vocabMap);
        }

                            </div>
                        </div>
                        <div class="section-p">${val(b.s5 || b.section_5)}</div>
                    </div>
                `;
            }
            document.getElementById('detailPage').style.display = 'block';
            document.getElementById('detailPage').scrollTop = 0;
            lucide.createIcons();
        }

        function openDetailFromlatest() { if (cachedBrief) openFull(cachedBrief); }
        function closeDetail() { document.getElementById('detailPage').style.display = 'none'; }

        function resetCapture() {
            document.getElementById('thoughtInput').value = '';
            document.getElementById('latestSparkCont').classList.add('hidden');
            document.getElementById('inputContainer').classList.remove('hidden');
            document.getElementById('thoughtInput').focus();
        }

        // ── Voice Input (Web Speech API) ──────────────────────────────
        let recognition = null;
        let isRecording = false;

        function initRecognition(targetId = 'thoughtInput') {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert('Voice input is not supported in this browser. Please use Chrome or Edge.');
                return null;
            }
            const rec = new SpeechRecognition();
            rec.lang = 'en-US';
            rec.interimResults = true;
            rec.continuous = false;
            rec.maxAlternatives = 1;

            rec.onstart = () => {
                isRecording = true;
                let micBtnId = 'micBtn';
                if (targetId === 'masteryInput') micBtnId = 'masteryMicBtn';
                if (targetId === 'journalInput') micBtnId = 'journalMicBtn';

                document.getElementById(micBtnId).classList.add('recording');

                let statusId = 'micStatus';
                if (targetId === 'masteryInput') statusId = 'masteryMicStatus';
                if (targetId === 'journalInput') statusId = 'journalMicStatus';

                const status = document.getElementById(statusId);
                status.classList.remove('hidden-status');
                status.textContent = '● Listening…';
            };

            rec.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                const textarea = document.getElementById(targetId);
                // Show interim result live in the textarea
                const base = textarea.dataset.base || '';
                textarea.value = base + transcript;

                if (event.results[event.results.length - 1].isFinal) {
                    textarea.dataset.base = textarea.value + ' ';
                    let statusId = 'micStatus';
                    if (targetId === 'masteryInput') statusId = 'masteryMicStatus';
                    if (targetId === 'journalInput') statusId = 'journalMicStatus';
                    document.getElementById(statusId).textContent = '✓ Captured';
                }
            };

            rec.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                const msgs = {
                    'no-speech': 'No speech detected. Try again.',
                    'audio-capture': 'Microphone not found.',
                    'not-allowed': 'Microphone access denied. Please allow mic permissions.',
                };
                let statusId = 'micStatus';
                if (targetId === 'masteryInput') statusId = 'masteryMicStatus';
                if (targetId === 'journalInput') statusId = 'journalMicStatus';

                const status = document.getElementById(statusId);
                status.textContent = msgs[event.error] || 'Error: ' + event.error;
                stopRecording(targetId);
            };

            rec.onend = () => {
                stopRecording(targetId);
            };

            return rec;
        }

        function stopRecording(targetId = 'thoughtInput') {
            isRecording = false;
            let micBtnId = 'micBtn';
            if (targetId === 'masteryInput') micBtnId = 'masteryMicBtn';
            if (targetId === 'journalInput') micBtnId = 'journalMicBtn';

            document.getElementById(micBtnId).classList.remove('recording');
            setTimeout(() => {
                let statusId = 'micStatus';
                if (targetId === 'masteryInput') statusId = 'masteryMicStatus';
                if (targetId === 'journalInput') statusId = 'journalMicStatus';

                const status = document.getElementById(statusId);
                if (status && status.textContent !== 'Microphone access denied. Please allow mic permissions.') {
                    status.classList.add('hidden-status');
                }
                // Clear the base so next recording starts fresh appended
                const textarea = document.getElementById(targetId);
                textarea.dataset.base = textarea.value.trim() ? textarea.value.trim() + ' ' : '';
            }, 1800);
        }

        function toggleMic(targetId = 'thoughtInput') {
            if (isRecording) {
                if (recognition) recognition.stop();
                return;
            }
            recognition = initRecognition(targetId);
            if (recognition) recognition.start();
        }

        // ── Speaker / Text-to-Speech ──────────────────────────────
        let currentUtterance = null;
        let lastSpeakingBtn = null;

        function toggleSpeak(source) {
            const synth = window.speechSynthesis;

            // If already speaking, stop
            if (synth.speaking) {
                synth.cancel();
                if (lastSpeakingBtn) {
                    lastSpeakingBtn.classList.remove('speaking');
                    lastSpeakingBtn.innerHTML = '<i data-lucide="volume-2"></i>';
                    lucide.createIcons();
                }

                // If the same button was clicked, we just stop. 
                // If it was a DIFFERENT button, we stop then start new one below.
                if (lastSpeakingBtn === event.currentTarget) {
                    lastSpeakingBtn = null;
                    return;
                }
            }

            const btn = event.currentTarget;
            let text = '';

            if (typeof source === 'string') {
                text = document.getElementById(source).innerText;
            } else if (source instanceof HTMLElement) {
                text = source.innerText;
            }

            if (!text || text.includes('Not generated')) return;

            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = playbackSpeed;
            utter.pitch = 1.0;

            utter.onstart = () => {
                btn.classList.add('speaking');
                btn.innerHTML = '<i data-lucide="square"></i>';
                lucide.createIcons();
                lastSpeakingBtn = btn;
            };

            utter.onend = () => {
                btn.classList.remove('speaking');
                btn.innerHTML = '<i data-lucide="volume-2"></i>';
                lucide.createIcons();
                lastSpeakingBtn = null;
            };

            synth.speak(utter);
            currentUtterance = utter;
        }

        // --- NEW FEATURES LOGIC ---

        function showToast(msg, duration = 3000) {
            const toast = document.createElement('div');
            toast.className = 'toast-notify';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }

        // 1. Text Selection Menu Logic
        document.addEventListener('mouseup', (e) => {
            const selection = window.getSelection();
            const selectedText = selection.toString().trim();
            const menu = document.getElementById('selectionMenu');

            if (selectedText.length > 0) {
                const range = selection.getRangeAt(0);
                const rect = range.getBoundingClientRect();

                menu.style.left = `${rect.left + window.scrollX}px`;
                menu.style.top = `${rect.top + window.scrollY - 50}px`;
                menu.classList.remove('hidden');
                menu.dataset.text = selectedText;
            } else {
                if (!menu.contains(e.target)) {
                    menu.classList.add('hidden');
                }
            }
        });

        function copySelection() {
            const text = document.getElementById('selectionMenu').dataset.text;
            navigator.clipboard.writeText(text);
            showToast("Copied to clipboard!");
            document.getElementById('selectionMenu').classList.add('hidden');
        }

        function playSelection() {
            const text = document.getElementById('selectionMenu').dataset.text;
            const utter = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(utter);
            document.getElementById('selectionMenu').classList.add('hidden');
        }

        async function explainSelection() {
            const text = document.getElementById('selectionMenu').dataset.text;
            document.getElementById('selectionMenu').classList.add('hidden');
            showToast("💡 Thinking...", 2000);

            try {
                const res = await fetch('/memory-tasks/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, manual: false })
                });
                const data = await res.json();

                // Show floating explanation
                const explanation = data.explanation;
                const example = data.example;

                alert(`EXPLANATION: ${explanation}\n\nEXAMPLE: ${example}\n\n(Added to 147 Memory Tasks)`);
            } catch (err) {
                showToast("Failed to process");
            }
        }

        // 2. Floating Note Logic
        let isNoteOpen = false;
        function toggleNote() {
            const note = document.getElementById('floatingNote');
            if (isNoteOpen) {
                note.classList.add('hidden');
            } else {
                note.classList.remove('hidden');
            }
            isNoteOpen = !isNoteOpen;
        }

        async function saveFloatingNote() {
            const text = document.getElementById('noteText').value.trim();
            if (!text) return;

            try {
                await fetch('/save-note', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: text, thought_id: 0 })
                });
                showToast("Note Saved!", 2000);
            } catch (err) {
                showToast("Failed to save note");
            }
        }

        // Draggable Note
        const note = document.getElementById('floatingNote');
        const header = document.getElementById('noteHeader');
        let offsetX, offsetY, isDragging = false;

        header.onmousedown = (e) => {
            isDragging = true;
            offsetX = e.clientX - note.offsetLeft;
            offsetY = e.clientY - note.offsetTop;
        };

        document.onmousemove = (e) => {
            if (!isDragging) return;
            note.style.left = `${e.clientX - offsetX}px`;
            note.style.top = `${e.clientY - offsetY}px`;
            note.style.bottom = 'auto';
            note.style.right = 'auto';
        };

        document.onmouseup = () => { isDragging = false; };

        // 3. 147 Memory Method
        async function addManualMemory() {
            const input = document.getElementById('manualMemoryInput');
            const val = input.value.trim();
            if (!val) return;

            try {
                await fetch('/memory-tasks/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: val, manual: true })
                });
                input.value = '';
                showToast("Added to 147 System!");
                fetchMemoryTasks();
            } catch (err) {
                showToast("Error adding task");
            }
        }

        async function fetchMemoryTasks() {
            try {
                const resDue = await fetch('/memory-tasks/due');
                const due = await resDue.json();
                renderTasks('dueTasksGrid', due, true);

                const resAll = await fetch('/memory-tasks/all');
                const all = await resAll.json();
                renderTasks('allMemoryGrid', all, false);
            } catch (err) {
                console.error("Fetch Memory Error", err);
            }
        }

        function renderTasks(gridId, tasks, isDue) {
            const grid = document.getElementById(gridId);
            if (tasks.length === 0) {
                grid.innerHTML = '<div style="opacity:0.3; padding:1rem;">No tasks here.</div>';
                return;
            }
            grid.innerHTML = tasks.map(t => `
                <div class="morning-card" style="border-left: 4px solid var(--accent);">
                    <div class="memory-badge badge-step${t.step}">Step ${t.step}: ${t.step === 0 ? 'Review Tomorrow' : t.step === 1 ? '4-Day Interval' : t.step === 2 ? 'Final 7-Day Polish' : 'Mastered'}</div>
                    <div class="morning-p" style="font-weight:700; font-size:1.1rem; color:var(--accent);">${t.text}</div>
                    <div class="tag-card">
                        <div class="tag-title">Explanation</div>
                        <div class="tag-desc">${t.explanation}</div>
                    </div>
                    <div class="tag-card">
                        <div class="tag-title">Example</div>
                        <div class="tag-desc">${t.example}</div>
                    </div>
                    ${isDue ? `<button class="spark-btn" onclick="completeTask(${t.id})" style="width:100%; margin-top:1rem;">Mark Revision Done</button>` : ''}
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function completeTask(id) {
            try {
                await fetch('/memory-tasks/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_id: id })
                });
                showToast("Revision Logged!", 2000);
                fetchMemoryTasks();
            } catch (err) {
                showToast("Error completing task");
            }
        }

        // 4. Interactive Typography & Clean Rendering
        function val(text) {
            if (!text || text.includes('Not generated')) return '<span style="opacity:0.3">Tactical data pending...</span>';

            // Apply Vocabulary Highlights if provided at the bottom of the brief
            // We'll scan the text to find words mentioned in the "Vocabulary" section
            let lines = text.split('\n');
            let html = "";
            lines.forEach(line => {
                let clean = line.replace(/[*#]/g, '').trim();
                if (!clean) return;

                // Header detection: ends with : or looks like a heading
                if (line.trim().startsWith('#') || (clean.length < 50 && clean === clean.toUpperCase() && clean.length > 3) || clean.endsWith(':')) {
                    html += `<div class="highlighted-heading">${clean}</div>`;
                } else {
                    html += `<p class="morning-p">${highlightWords(clean)}</p>`;
                }
            });
            return html;
        }

        // Tough words list from request example
        const globalVocab = {
            "Serene": "peaceful and untroubled. Usage: The serene landscape of the countryside provided a perfect backdrop for meditation.",
            "Isolated": "alone or separated from others. Usage: The isolated research station was only accessible by helicopter.",
            "Indulge": "to give in to a desire or pleasure. Usage: She indulged in her love of chocolate, savoring each bite.",
            "Solace": "comfort or consolation. Usage: The news of her recovery brought solace to her family.",
            "Solitude": "the state of being alone.",
            "Unbridled": "unrestricted or unchecked.",
            "Introspection": "the examination of one's own thoughts and feelings.",
            "Transformative": "causing a significant change.",
            "Rejuvenating": "restoring energy or vitality.",
            "Autonomy": "the freedom to act independently.",
            "Unchecked": "unrestricted or uncontrolled."
        };

        function highlightWords(text) {
            let result = text;
            for (let word in globalVocab) {
                const regex = new RegExp(`\\b${word}\\b`, 'gi');
                result = result.replace(regex, (match) => {
                    return `<span class="vocab-highlight" onclick="showVocab('${word}')">${match}</span>`;
                });
            }
            return result;
        }

        function showVocab(word) {
            const info = globalVocab[word];
            alert(`${word.toUpperCase()}\n\n${info}`);
        }
    </script>
