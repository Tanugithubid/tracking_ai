<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Founder | The Executive Brief</title>
    <meta name="theme-color" content="#03040b">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@1,400;1,700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-deep: #03040b;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #a5b4fc;
            /* Pale Lavender/Indigo */
            --amber-glow: #f59e0b;
            /* Energetic Amber */
            --text-high: #ffffff;
            --text-mid: #94a3b8;
            --font-main: 'Outfit', sans-serif;
            --font-quote: 'Playfair Display', serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            background: var(--bg-deep);
            color: var(--text-high);
            -webkit-font-smoothing: antialiased;
        }

        .ambient-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% -20%, rgba(165, 180, 252, 0.08) 0%, transparent 60%);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent);
            opacity: 0.7;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem;
        }

        .nav-link {
            background: none;
            border: none;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-mid);
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-link.active {
            color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
            padding: 0.4rem 1rem;
            border-radius: 20px;
        }

        /* HERO SPARK CARD: The Founder's Vision UI */
        .hero-spark-container {
            margin-top: 10vh;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        .hero-spark-text {
            font-family: var(--font-quote);
            font-style: italic;
            font-size: 2rem;
            line-height: 1.5;
            margin-bottom: 2rem;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .deep-dive-btn {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.3s;
        }

        /* MORNING DIGEST ENERGETIC UI */
        .morning-section {
            margin-top: 1rem;
            animation: floatUp 0.8s ease-out;
        }

        .morning-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 2.5rem 2rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(20px);
        }

        .morning-h {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--amber-glow);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .morning-p {
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--text-high);
            margin-bottom: 1rem;
        }

        .tag-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            border-left: 3px solid var(--accent);
        }

        .tag-title {
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.3rem;
        }

        .tag-desc {
            font-size: 0.95rem;
            color: var(--text-mid);
        }

        .mastery-box {
            background: rgba(129, 140, 248, 0.05);
            border-radius: 20px;
            padding: 1.5rem;
        }

        .mastery-before {
            font-size: 0.8rem;
            color: #ef4444;
            opacity: 0.6;
            margin-bottom: 0.5rem;
            text-decoration: line-through;
        }

        .mastery-after {
            font-size: 1rem;
            color: #10b981;
            font-weight: 600;
            line-height: 1.4;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes floatUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hidden {
            display: none !important;
        }

        /* Overlay Full Brief */
        #detailPage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-deep);
            z-index: 1000;
            overflow-y: auto;
            padding: 3rem 1.5rem;
            box-sizing: border-box;
            display: none;
        }

        .section-box {
            border-bottom: 1px solid var(--glass-border);
            padding: 2rem 0;
        }

        .section-h {
            font-size: 0.6rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 3px;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .section-p {
            font-size: 1rem;
            color: var(--text-mid);
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .close-btn {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #000;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.8rem;
            z-index: 1001;
        }
    </style>
</head>

<body>
    <div class="ambient-bg"></div>

    <div class="container">
        <header>
            <div class="logo">Strategic Architecture Node</div>
            <div class="nav">
                <button class="nav-link active" onclick="showTab('capture')">Capture</button>
                <button class="nav-link" onclick="showTab('vault')">Vault</button>
                <button class="nav-link" onclick="showTab('morning')">Daybreak</button>
            </div>
        </header>

        <!-- Capture Section -->
        <div id="captureTab">
            <div style="margin-top: 15vh; text-align: center;" id="inputContainer">
                <textarea id="thoughtInput" placeholder="What's your spark today?"></textarea><br>
                <button class="spark-btn" onclick="generateSpark()">Run Strategic Node</button>
            </div>
            <div class="hero-spark-container hidden" id="latestSparkCont">
                <div class="hero-spark-text" id="sparkOutput"></div>
                <div class="deep-dive-btn" onclick="openDetailFromlatest()">Analyze Venture Details →</div>
                <div class="spark-btn" onclick="resetCapture()"
                    style="margin-top: 3rem; opacity: 0.8; font-size: 0.7rem;">Draft New Vision +</div>
            </div>
        </div>

        <!-- Vault Section -->
        <div id="vaultTab" class="hidden">
            <div id="vaultGrid"></div>
        </div>

        <!-- Morning Section -->
        <div id="morningTab" class="hidden">
            <div id="morningGrid" class="morning-section"></div>
        </div>
    </div>

    <!-- Detail View -->
    <div id="detailPage">
        <div id="fullBriefContent"></div>
        <button class="close-btn" onclick="closeDetail()">Dismiss</button>
    </div>

    <script>
        lucide.createIcons();
        let cachedBrief = null;

        function showTab(id) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('captureTab').classList.add('hidden');
            document.getElementById('vaultTab').classList.add('hidden');
            document.getElementById('morningTab').classList.add('hidden');
            document.getElementById(id + 'Tab').classList.remove('hidden');

            if (id === 'vault') fetchVault();
            if (id === 'morning') fetchMorning();
        }

        async function generateSpark() {
            const val = document.getElementById('thoughtInput').value;
            if (!val) return;
            const btn = document.querySelector('.spark-btn');
            btn.innerText = "...";
            const res = await fetch('/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ raw_thought: val })
            });
            const data = await res.json();
            document.getElementById('inputContainer').classList.add('hidden');
            document.getElementById('sparkOutput').innerText = data.mini_insight;
            document.getElementById('latestSparkCont').classList.remove('hidden');
            cachedBrief = data.full_brief;
            btn.innerText = "Run Strategic Node";
        }

        async function fetchVault() {
            const res = await fetch('/vault');
            const data = await res.json();
            document.getElementById('vaultGrid').innerHTML = data.map(v => `
                <div class="morning-card" style="padding: 1.5rem; margin-bottom: 1rem;" onclick='openFull(${JSON.stringify(v.full_brief)})'>
                    <div class="section-h">${new Date(v.created_at).toLocaleDateString()}</div>
                    <div style="font-size:1.1rem; color:#fff;">${v.mini_insight}</div>
                </div>
            `).join('');
        }

        async function fetchMorning() {
            const res = await fetch('/morning-digest');
            const data = await res.json();
            const grid = document.getElementById('morningGrid');

            // Minimal Parser for [STORY], [NEWS], [WORDS], [MASTERY]
            const raw = data.content;
            const story = (raw.match(/\[STORY\]:(.*?)(?=\[|$)/s) || ["", ""])[1].trim();
            const news = (raw.match(/\[NEWS\]:(.*?)(?=\[|$)/s) || ["", ""])[1].trim();
            const words = (raw.match(/\[WORDS\]:(.*?)(?=\[|$)/s) || ["", ""])[1].trim();
            const mastery = (raw.match(/\[MASTERY\]:(.*?)(?=\[|$)/s) || ["", ""])[1].trim();

            grid.innerHTML = `
                <div class="morning-card">
                    <div class="morning-h"><i data-lucide="sun"></i> The Morning Spark</div>
                    <div class="morning-p" style="font-family: var(--font-quote); font-style: italic; font-size: 1.3rem;">"${story}"</div>
                </div>

                <div class="morning-card">
                    <div class="morning-h"><i data-lucide="rss"></i> 2026 Intelligence</div>
                    <div class="section-p">${news.split('\n').map(n => `<div class="tag-card">${n}</div>`).join('')}</div>
                </div>

                <div class="morning-card">
                    <div class="morning-h"><i data-lucide="book-open"></i> Portfolio Vocabulary</div>
                    <div class="section-p">${words.split('\n').filter(w => w.length > 5).map(w => `<div class="tag-card"><div class="tag-desc">${w}</div></div>`).join('')}</div>
                </div>

                <div class="morning-card">
                    <div class="morning-h"><i data-lucide="trending-up"></i> Executive Mastery</div>
                    <div class="mastery-box">
                        <div class="mastery-before">${(mastery.match(/Before:(.*?)(?=After|$)/s) || ["", "Raw Entry"])[1].trim()}</div>
                        <div class="mastery-after">${(mastery.match(/After:(.*?)(?=Why|$)/s) || ["", "Elite Entry"])[1].trim()}</div>
                        <div class="tag-desc" style="margin-top:1rem; font-style:italic; font-size: 0.8rem;">${(mastery.match(/Why:(.*?)$/s) || ["", "Correction strategy"])[1].trim()}</div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function openFull(b) {
            const cont = document.getElementById('fullBriefContent');
            cont.innerHTML = `
                <div class="section-box"><div class="section-h">💎 Vision & Market</div><div class="section-p">${b.s1 || b.section_1}</div></div>
                <div class="section-box"><div class="section-h">🛠️ Roadmap</div><div class="section-p">${b.s2 || b.section_2}</div></div>
                <div class="section-box"><div class="section-h">🌲 Stanford Spike</div><div class="section-p">${b.s3 || b.section_3}</div></div>
                <div class="section-box"><div class="section-h">🗣️ MBA Communication Lab</div><div class="section-p">${b.s4 || b.section_4}</div></div>
                <div class="section-box"><div class="section-h">📰 Related Intel</div><div class="section-p">${b.s5 || b.section_5}</div></div>
            `;
            document.getElementById('detailPage').style.display = 'block';
        }

        function openDetailFromlatest() { if (cachedBrief) openFull(cachedBrief); }
        function closeDetail() { document.getElementById('detailPage').style.display = 'none'; }

        function resetCapture() {
            document.getElementById('thoughtInput').value = '';
            document.getElementById('latestSparkCont').classList.add('hidden');
            document.getElementById('inputContainer').classList.remove('hidden');
            document.getElementById('thoughtInput').focus();
        }
    </script>
</body>

</html>
