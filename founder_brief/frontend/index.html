<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Founder | The Executive Brief</title>
    <meta name="theme-color" content="#03040b">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@1,400;1,700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-deep: #03040b;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #a5b4fc;
            /* Pale Lavender/Indigo */
            --amber-glow: #f59e0b;
            /* Energetic Amber */
            --text-high: #ffffff;
            --text-mid: #94a3b8;
            --font-main: 'Outfit', sans-serif;
            --font-quote: 'Playfair Display', serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            background: var(--bg-deep);
            color: var(--text-high);
            -webkit-font-smoothing: antialiased;
        }

        .ambient-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% -20%, rgba(165, 180, 252, 0.08) 0%, transparent 60%);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent);
            opacity: 0.7;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem;
        }

        .nav-link {
            background: none;
            border: none;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-mid);
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-link.active {
            color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
            padding: 0.4rem 1rem;
            border-radius: 20px;
        }

        /* HERO SPARK CARD: The Founder's Vision UI */
        .hero-spark-container {
            margin-top: 10vh;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        .hero-spark-text {
            font-family: var(--font-quote);
            font-style: italic;
            font-size: 2rem;
            line-height: 1.5;
            margin-bottom: 2rem;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .deep-dive-btn {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.3s;
        }

        /* MORNING DIGEST ENERGETIC UI */
        .morning-section {
            margin-top: 1rem;
            animation: floatUp 0.8s ease-out;
        }

        .morning-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }

        .archive-item {
            cursor: pointer;
            opacity: 0.7;
            margin-bottom: 0.8rem;
        }

        .archive-item:hover {
            opacity: 1;
            border-color: var(--accent);
        }

        .archive-content {
            display: none;
            margin-top: 1rem;
            border-top: 1px solid var(--glass-border);
            padding-top: 1rem;
        }

        .archive-item.expanded {
            opacity: 1;
            border-color: var(--accent);
        }

        .archive-item.expanded .archive-content {
            display: block;
        }

        .morning-h {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--amber-glow);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .morning-p {
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--text-high);
            margin-bottom: 1rem;
        }

        .tag-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            border-left: 3px solid var(--accent);
        }

        .tag-title {
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.3rem;
        }

        .tag-desc {
            font-size: 0.95rem;
            color: var(--text-mid);
        }

        .mastery-box {
            background: rgba(129, 140, 248, 0.05);
            border-radius: 20px;
            padding: 1.5rem;
        }

        .mastery-before {
            font-size: 0.8rem;
            color: #ef4444;
            opacity: 0.6;
            margin-bottom: 0.5rem;
            text-decoration: line-through;
        }

        .mastery-after {
            font-size: 1rem;
            color: #10b981;
            font-weight: 600;
            line-height: 1.4;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes floatUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mic Button */
        .input-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
            width: 100%;
        }

        #thoughtInput,
        #masteryInput,
        #journalInput {
            width: 100%;
            height: 180px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            color: var(--text-high);
            font-family: var(--font-main);
            font-size: 1.1rem;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
            margin-bottom: 0.5rem;
            box-sizing: border-box;
            backdrop-filter: blur(20px);
        }

        #thoughtInput:focus,
        #masteryInput:focus,
        #journalInput:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(165, 180, 252, 0.1);
        }

        #thoughtInput::placeholder,
        #masteryInput::placeholder,
        #journalInput::placeholder {
            color: var(--text-mid);
            opacity: 0.5;
        }

        .mic-btn {
            position: relative;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            backdrop-filter: blur(20px);
            color: var(--text-mid);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .mic-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(165, 180, 252, 0.08);
        }

        .mic-btn.recording {
            background: rgba(239, 68, 68, 0.15);
            border-color: #ef4444;
            color: #ef4444;
        }

        .mic-btn.recording::before,
        .mic-btn.recording::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            border: 1.5px solid #ef4444;
            animation: micPulse 1.6s ease-out infinite;
        }

        .mic-btn.recording::after {
            animation-delay: 0.6s;
        }

        @keyframes micPulse {
            0% {
                width: 52px;
                height: 52px;
                opacity: 0.7;
            }

            100% {
                width: 90px;
                height: 90px;
                opacity: 0;
            }
        }

        .mic-status {
            font-size: 0.7rem;
            color: #ef4444;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 0.6rem;
            min-height: 1rem;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        .mic-status.hidden-status {
            visibility: hidden;
        }

        .spark-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(165, 180, 252, 0.2);
            flex: 1;
        }

        .spark-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(165, 180, 252, 0.3);
            filter: brightness(1.1);
        }

        .spark-btn:active {
            transform: translateY(0);
        }

        .spark-btn:disabled {
            background: var(--text-mid);
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .hidden {
            display: none !important;
        }

        /* Speaker Button Styles */
        .speak-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: var(--accent);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            margin-left: 0.5rem;
            vertical-align: middle;
        }

        .speak-btn:hover {
            background: rgba(165, 180, 252, 0.15);
            transform: scale(1.1);
        }

        .speak-btn.speaking {
            background: var(--accent);
            color: #000;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(165, 180, 252, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(165, 180, 252, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(165, 180, 252, 0);
            }
        }

        .speed-toggle {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--accent);
            padding: 0.4rem 0.8rem;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(10px);
            min-width: 55px;
        }

        .speed-toggle:hover {
            border-color: var(--accent);
            background: rgba(165, 180, 252, 0.08);
        }

        /* Overlay Full Brief */
        #detailPage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-deep);
            z-index: 1000;
            overflow-y: auto;
            padding: 3rem 1.5rem;
            box-sizing: border-box;
            display: none;
        }

        .section-box {
            border-bottom: 1px solid var(--glass-border);
            padding: 2rem 0;
        }

        .section-h {
            font-size: 0.6rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 3px;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .section-p {
            font-size: 1rem;
            color: var(--text-mid);
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .close-btn {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #000;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.8rem;
            z-index: 1001;
        }
    </style>
</head>

<body>
    <div class="ambient-bg"></div>

    <div class="container">
        <header>
            <div class="logo">Strategic Architecture Node</div>
            <div class="nav">
                <button class="nav-link active" onclick="showTab('capture')">Capture</button>
                <button class="nav-link" onclick="showTab('vault')">Vault</button>
                <button class="nav-link" onclick="showTab('morning')">Daybreak</button>
                <button class="nav-link" onclick="showTab('mastery')">MBA Lab</button>
                <button class="nav-link" onclick="showTab('journal')">My Thought</button>
            </div>
        </header>

        <!-- Capture Section -->
        <div id="captureTab">
            <div style="margin-top: 8vh; text-align: center;" id="inputContainer">
                <textarea id="thoughtInput" placeholder="What's your spark today?"></textarea>

                <div class="input-row">
                    <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Voice input">
                        <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z" />
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                            <line x1="12" y1="19" x2="12" y2="22" />
                        </svg>
                    </button>
                    <button class="spark-btn" onclick="generateSpark()">Run Strategic Node</button>
                </div>
                <div class="mic-status hidden-status" id="micStatus">● Listening…</div>
            </div>
            <div class="hero-spark-container hidden" id="latestSparkCont">
                <div
                    style="display: flex; align-items: center; justify-content: center; gap: 0.6rem; margin-bottom: 2rem;">
                    <div class="hero-spark-text" id="sparkOutput" style="margin-bottom: 0;"></div>
                    <div style="display: flex; gap: 0.4rem;">
                        <button class="speak-btn" id="captureSpeakBtn" onclick="toggleSpeak('sparkOutput')">
                            <i data-lucide="volume-2"></i>
                        </button>
                        <button class="speed-toggle" onclick="toggleSpeed()">
                            <span class="speed-label">1.0</span>x
                        </button>
                    </div>
                </div>
                <div class="deep-dive-btn" onclick="openDetailFromlatest()">Analyze Venture Details →</div>
                <div class="spark-btn" onclick="resetCapture()"
                    style="margin-top: 3rem; opacity: 0.8; font-size: 0.7rem;">Draft New Vision +</div>
            </div>
        </div>

        <!-- Vault Section -->
        <div id="vaultTab" class="hidden">
            <div id="vaultGrid"></div>
        </div>

        <!-- Morning Section -->
        <div id="morningTab" class="hidden">
            <div id="morningGrid" class="morning-section"></div>
        </div>

        <!-- Mastery Section -->
        <div id="masteryTab" class="hidden">
            <div style="margin-top: 5vh; text-align: center;" id="masteryInputCont">
                <div class="logo" style="margin-bottom: 1.5rem; opacity: 0.5;">Stanford / Business English Mastery</div>
                <textarea id="masteryInput"
                    placeholder="Paste your paragraph or speak to refine into Stanford MBA English..."></textarea>
                <div class="input-row">
                    <button class="mic-btn" id="masteryMicBtn" onclick="toggleMic('masteryInput')" title="Voice input">
                        <i data-lucide="mic"></i>
                    </button>
                    <button class="spark-btn" onclick="refineMastery()">Refine for Boardroom</button>
                </div>
                <div class="mic-status hidden-status" id="masteryMicStatus">● Listening…</div>
            </div>
            <div id="masteryResults" class="hidden" style="margin-top: 2rem;">
                <div id="masteryContent"></div>
                <button class="spark-btn" onclick="resetMastery()"
                    style="margin-top: 2rem; width: 100%; opacity: 0.8; font-size: 0.7rem;">New Refinement +</button>
            </div>
        </div>

        <!-- Journal Section -->
        <div id="journalTab" class="hidden">
            <div style="margin-top: 5vh; text-align: center;" id="journalInputCont">
                <div class="logo" style="margin-bottom: 1.5rem; opacity: 0.5;">Personal Thought Journal</div>
                <textarea id="journalInput"
                    placeholder="Record raw thoughts, reminders, or reflections... (No AI processing)"></textarea>
                <div class="input-row">
                    <button class="mic-btn" id="journalMicBtn" onclick="toggleMic('journalInput')" title="Voice input">
                        <i data-lucide="mic"></i>
                    </button>
                    <button class="spark-btn" onclick="saveJournal()">Save to Journal</button>
                </div>
                <div class="mic-status hidden-status" id="journalMicStatus">● Listening…</div>
            </div>

            <div id="journalGrid" style="margin-top: 3rem;"></div>
        </div>
    </div>

    <!-- Detail View -->
    <div id="detailPage">
        <div id="fullBriefContent"></div>
        <button class="close-btn" onclick="closeDetail()">Dismiss</button>
    </div>

    <script>
        lucide.createIcons();
        let cachedBrief = null;
        let vaultData = []; // global store for vault items (avoids JSON-in-onclick bugs)
        let playbackSpeed = 1.0;

        function toggleSpeed() {
            const speeds = [0.8, 1.0, 1.2, 1.5, 2.0];
            let idx = speeds.indexOf(playbackSpeed);
            playbackSpeed = speeds[(idx + 1) % speeds.length];

            // Update all labels
            document.querySelectorAll('.speed-label').forEach(el => {
                el.innerText = playbackSpeed.toFixed(1);
            });

            // If currently speaking, we have to restart or just apply to next. 
            // Web Speech API doesn't support changing rate mid-utterance easily.
            if (window.speechSynthesis.speaking) {
                showToast(`Speed set to ${playbackSpeed}x (applies to next segment)`, 2000);
            }
        }

        function showTab(id) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('captureTab').classList.add('hidden');
            document.getElementById('vaultTab').classList.add('hidden');
            document.getElementById('morningTab').classList.add('hidden');
            document.getElementById('masteryTab').classList.add('hidden');
            document.getElementById('journalTab').classList.add('hidden');
            document.getElementById(id + 'Tab').classList.remove('hidden');

            if (id === 'vault') fetchVault();
            if (id === 'morning') fetchMorning();
            if (id === 'journal') fetchJournal();
        }

        async function saveJournal() {
            const val = document.getElementById('journalInput').value.trim();
            if (!val) return;
            const btn = document.querySelector('#journalTab .spark-btn');
            btn.disabled = true;
            try {
                await fetch('/save-journal', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: val })
                });
                document.getElementById('journalInput').value = '';
                showToast('✅ Saved to Journal', 2000);
                fetchJournal();
            } catch (err) {
                showToast('❌ Failed to save', 3000);
            } finally {
                btn.disabled = false;
            }
        }

        async function fetchJournal() {
            const grid = document.getElementById('journalGrid');
            grid.innerHTML = '<div style="text-align:center; opacity:0.5;">Syncing thoughts...</div>';
            try {
                const res = await fetch('/get-journal');
                const data = await res.json();
                if (data.length === 0) {
                    grid.innerHTML = '<div style="text-align:center; opacity:0.3; padding: 3rem;">No thoughts recorded yet.</div>';
                    return;
                }
                grid.innerHTML = data.map((j, i) => `
                    <div class="morning-card" style="margin-bottom: 1rem;">
                        <div class="morning-h">
                            <div style="font-size: 0.7rem; opacity: 0.6;">${new Date(j.date).toLocaleString()}</div>
                            <div style="display:flex; gap:0.4rem;">
                                <button class="speak-btn" onclick="toggleSpeak(this.parentElement.parentElement.nextElementSibling)"><i data-lucide="volume-2"></i></button>
                                <button class="speed-toggle" onclick="toggleSpeed()"><span class="speed-label">${playbackSpeed.toFixed(1)}</span>x</button>
                            </div>
                        </div>
                        <div class="morning-p" style="font-size: 1rem; color: #fff; line-height: 1.6;">${j.content}</div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) {
                grid.innerHTML = '<div style="text-align:center; color:red;">Connection error</div>';
            }
        }

        async function refineMastery() {
            const val = document.getElementById('masteryInput').value.trim();
            if (!val) return;
            const btn = document.querySelector('#masteryTab .spark-btn');
            btn.innerText = "Polishing…";
            btn.disabled = true;
            try {
                const res = await fetch('/refine-english', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: val })
                });
                const data = await res.json();

                // Parse the [MISTAKES], [REFINED_TEXT], [CONCEPTS]
                const raw = data.analysis;
                const mistakes = (raw.match(/\[MISTAKES\]:(.*?)(?=\[|$)/s) || ["", "No mistakes found."])[1].trim();
                const refined = (raw.match(/\[REFINED_TEXT\]:(.*?)(?=\[|$)/s) || ["", "No refinement generated."])[1].trim();
                const concepts = (raw.match(/\[CONCEPTS\]:(.*?)(?=\[|$)/s) || ["", "No concepts extracted."])[1].trim();

                const cont = document.getElementById('masteryContent');
                cont.innerHTML = `
                    <div class="morning-card">
                        <div class="morning-h">
                            <div style="display:flex; align-items:center; gap:0.5rem;"><i data-lucide="alert-circle"></i> Mistake Analysis</div>
                            <div style="display:flex; gap:0.4rem;">
                                <button class="speak-btn" onclick="toggleSpeak(this.parentElement.parentElement.nextElementSibling)"><i data-lucide="volume-2"></i></button>
                                <button class="speed-toggle" onclick="toggleSpeed()"><span class="speed-label">${playbackSpeed.toFixed(1)}</span>x</button>
                            </div>
                        </div>
                        <div class="section-p" style="font-size:0.9rem;">${mistakes.split('\n').map(m => `<div class="tag-card">${m}</div>`).join('')}</div>
                    </div>

                    <div class="morning-card" style="border-color: var(--accent);">
                        <div class="morning-h" style="color:var(--accent);">
                            <div style="display:flex; align-items:center; gap:0.5rem;"><i data-lucide="check-circle"></i> Final Corrected Version</div>
                            <div style="display:flex; gap:0.4rem;">
                                <button class="speak-btn" onclick="toggleSpeak(this.parentElement.parentElement.nextElementSibling)"><i data-lucide="volume-2"></i></button>
                                <button class="speed-toggle" onclick="toggleSpeed()"><span class="speed-label">${playbackSpeed.toFixed(1)}</span>x</button>
                            </div>
                        </div>
                        <div class="morning-p" style="font-family: var(--font-quote); font-size: 1.2rem; font-style: italic;">"${refined}"</div>
                    </div>

                    <div class="morning-card">
                        <div class="morning-h">
                            <div style="display:flex; align-items:center; gap:0.5rem;"><i data-lucide="book-open"></i> Portfolio Vocabulary</div>
                            <div style="display:flex; gap:0.4rem;">
                                <button class="speak-btn" onclick="toggleSpeak(this.parentElement.parentElement.nextElementSibling)"><i data-lucide="volume-2"></i></button>
                                <button class="speed-toggle" onclick="toggleSpeed()"><span class="speed-label">${playbackSpeed.toFixed(1)}</span>x</button>
                            </div>
                        </div>

        async function generateSpark() {
            const val = document.getElementById('thoughtInput').value.trim();

            try {

                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ raw_thought: val })
                });
                if (!res.ok) throw new Error('Server error: ' + res.status);
                const data = await res.json();

                // Detect fallback (API key missing / Groq failed)
                const isFallback = data.mini_insight && data.mini_insight.startsWith('Venture concept focusing on');

                document.body.appendChild(t);
            }
            t.textContent = msg;
            t.style.opacity = '1';
            clearTimeout(t._timer);

        // ── Voice Input (Web Speech API) ──────────────────────────────
        let recognition = null;
        let isRecording = false;

        function initRecognition(targetId = 'thoughtInput') {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert('Voice input is not supported in this browser. Please use Chrome or Edge.');
                return null;
            }
            const rec = new SpeechRecognition();
            rec.lang = 'en-US';
            rec.interimResults = true;
            rec.continuous = false;
            rec.maxAlternatives = 1;

            rec.onstart = () => {
                isRecording = true;
                let micBtnId = 'micBtn';
                if (targetId === 'masteryInput') micBtnId = 'masteryMicBtn';
                if (targetId === 'journalInput') micBtnId = 'journalMicBtn';

                document.getElementById(micBtnId).classList.add('recording');

                let statusId = 'micStatus';
                if (targetId === 'masteryInput') statusId = 'masteryMicStatus';
                if (targetId === 'journalInput') statusId = 'journalMicStatus';

                const status = document.getElementById(statusId);
                status.classList.remove('hidden-status');
                status.textContent = '● Listening…';
            };

            rec.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                const textarea = document.getElementById(targetId);
                // Show interim result live in the textarea
                const base = textarea.dataset.base || '';
                textarea.value = base + transcript;

                if (event.results[event.results.length - 1].isFinal) {
                    textarea.dataset.base = textarea.value + ' ';
                    let statusId = 'micStatus';
                    if (targetId === 'masteryInput') statusId = 'masteryMicStatus';
                    if (targetId === 'journalInput') statusId = 'journalMicStatus';
                    document.getElementById(statusId).textContent = '✓ Captured';
                }
            };

            rec.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                const msgs = {
                    'no-speech': 'No speech detected. Try again.',
                    'audio-capture': 'Microphone not found.',
                    'not-allowed': 'Microphone access denied. Please allow mic permissions.',
                };
                let statusId = 'micStatus';
                if (targetId === 'masteryInput') statusId = 'masteryMicStatus';
                if (targetId === 'journalInput') statusId = 'journalMicStatus';

                const status = document.getElementById(statusId);
                status.textContent = msgs[event.error] || 'Error: ' + event.error;
                stopRecording(targetId);
            };

            rec.onend = () => {
                stopRecording(targetId);
            };

            return rec;
        }

        function stopRecording(targetId = 'thoughtInput') {
            isRecording = false;
            let micBtnId = 'micBtn';
            if (targetId === 'masteryInput') micBtnId = 'masteryMicBtn';
            if (targetId === 'journalInput') micBtnId = 'journalMicBtn';

            document.getElementById(micBtnId).classList.remove('recording');
            setTimeout(() => {
                let statusId = 'micStatus';
                if (targetId === 'masteryInput') statusId = 'masteryMicStatus';
                if (targetId === 'journalInput') statusId = 'journalMicStatus';

                const status = document.getElementById(statusId);
                if (status && status.textContent !== 'Microphone access denied. Please allow mic permissions.') {
                    status.classList.add('hidden-status');
                }
                // Clear the base so next recording starts fresh appended
                const textarea = document.getElementById(targetId);
                textarea.dataset.base = textarea.value.trim() ? textarea.value.trim() + ' ' : '';
            }, 1800);
        }

        function toggleMic(targetId = 'thoughtInput') {
            if (isRecording) {
                if (recognition) recognition.stop();
                return;
            }
            recognition = initRecognition(targetId);
            if (recognition) recognition.start();
        }

        // ── Speaker / Text-to-Speech ──────────────────────────────
        let currentUtterance = null;
        let lastSpeakingBtn = null;

        function toggleSpeak(source) {
            const synth = window.speechSynthesis;

            // If already speaking, stop
            if (synth.speaking) {
                synth.cancel();
                if (lastSpeakingBtn) {
                    lastSpeakingBtn.classList.remove('speaking');
                    lastSpeakingBtn.innerHTML = '<i data-lucide="volume-2"></i>';
                    lucide.createIcons();
                }

                // If the same button was clicked, we just stop. 
                // If it was a DIFFERENT button, we stop then start new one below.
                if (lastSpeakingBtn === event.currentTarget) {
                    lastSpeakingBtn = null;
                    return;
                }
            }

            const btn = event.currentTarget;
            let text = '';

            if (typeof source === 'string') {
                text = document.getElementById(source).innerText;
            } else if (source instanceof HTMLElement) {
                text = source.innerText;
            }

            if (!text || text.includes('Not generated')) return;

            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = playbackSpeed;
            utter.pitch = 1.0;

            utter.onstart = () => {
                btn.classList.add('speaking');
                btn.innerHTML = '<i data-lucide="square"></i>';
                lucide.createIcons();
                lastSpeakingBtn = btn;
            };

            utter.onend = () => {
                btn.classList.remove('speaking');
                btn.innerHTML = '<i data-lucide="volume-2"></i>';
                lucide.createIcons();
                lastSpeakingBtn = null;
            };

            synth.speak(utter);
            currentUtterance = utter;
        }
    </script>
